<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dosing Calculator | Katalyst Peptides</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">KATALYST PEPTIDES</div>
            <div class="nav-links">
                <a href="index.html">Catalog</a>
                <a href="articles.html">Research Hub</a>
                <a href="calculator.html">Dosing Tool</a>
            </div>
        </nav>
    </header>

    <main class="calc-container">
        <h1>Peptide Dosage Calculator</h1>
        <div class="input-group">
            <label>Vial Size (mg):</label>
            <input type="number" id="vialSize" placeholder="e.g. 5">
        </div>
        <div class="input-group">
            <label>Bacteriostatic Water Added (ml):</label>
            <input type="number" id="water" placeholder="e.g. 2">
        </div>
        <div class="input-group">
            <label>Desired Dose (mcg):</label>
            <input type="number" id="dose" placeholder="e.g. 250">
        </div>
        <button onclick="calculate()" class="btn-calc">Calculate Units</button>

        <div id="result" class="result-box">
            </div>
    </main>

    <script>
        function calculate() {
            const mg = document.getElementById('vialSize').value;
            const ml = document.getElementById('water').value;
            const mcg = document.getElementById('dose').value;

            if(mg && ml && mcg) {
                const totalMcg = mg * 1000;
                const units = (mcg / totalMcg) * (ml * 100);
                document.getElementById('result').innerHTML = `<h3>Draw to: ${units.toFixed(1)} Units</h3><p>on a 100-unit insulin syringe</p>`;
            }
        }
    </script>
</body>
</html>
