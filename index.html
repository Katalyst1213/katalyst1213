<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalyst Peptides | Research Catalog</title>
    <link rel="stylesheet" href="style.css">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-43W7D6SGG7"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-43W7D6SGG7');
    </script>
</head>
<body>
    <header>
        <nav>
            <div class="logo">KATALYST PEPTIDES</div>
            <div class="nav-links">
                <a href="index.html">Catalog</a>
                <a href="articles.html">Research Hub</a>
                <a href="calculator.html">Dosing Tool</a>
            </div>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>Premium Research Peptides</h1>
            <p>Order over R3000 to get 10% OFF and FREE Shipping!</p>
        </section>

        <div id="product-grid" class="grid">
            </div>

        <aside id="cart-sidebar">
            <h2>Your Order</h2>
            <div id="cart-items"></div>
            <hr>
            <div class="cart-summary">
                <p>Subtotal: <span id="cart-subtotal">R0.00</span></p>
                <p>Discount (10%): <span id="cart-discount">R0.00</span></p>
                <p>Shipping: <span id="cart-shipping">R150.00</span></p>
                <h3>Total: <span id="cart-total">R150.00</span></h3>
            </div>
            <button onclick="checkoutWhatsApp()" class="btn-checkout">Order via WhatsApp</button>
        </aside>
    </main>

    <script>
        // Updated prices with 10% increase
        const products = [
            { id: 1, name: "BPC-157 (5mg)", price: 550, image: "bpc157.jpg" },
            { id: 2, name: "TB-500 (5mg)", price: 660, image: "tb500.jpg" },
            { id: 3, name: "Retatrutide (5mg)", price: 1320, image: "reta5.jpg" },
            { id: 4, name: "Retatrutide (10mg)", price: 2420, image: "reta10.jpg" },
            { id: 5, name: "Tirzepatide (5mg)", price: 1100, image: "tirz5.jpg" },
            { id: 6, name: "Semaglutide (5mg)", price: 880, image: "sema5.jpg" }
        ];

        let cart = [];

        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.map(p => `
                <div class="product-card">
                    <img src="${p.image}" alt="${p.name}">
                    <h3>${p.name}</h3>
                    <p class="price">R${p.price}</p>
                    <button onclick="addToCart(${p.id})" class="btn-add">Add to Order</button>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            const inCart = cart.find(item => item.id === id);
            if (inCart) {
                inCart.quantity++;
            } else {
                cart.push({...product, quantity: 1});
            }
            updateUI();
        }

        function updateUI() {
            const cartList = document.getElementById('cart-items');
            cartList.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <span>${item.name} x${item.quantity}</span>
                    <span>R${item.price * item.quantity}</span>
                </div>
            `).join('');

            let subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            let discount = 0;
            let shipping = 150;

            // Special: Over R3000 gets 10% off and Free Shipping
            if (subtotal >= 3000) {
                discount = subtotal * 0.10;
                shipping = 0;
            }

            let total = subtotal - discount + shipping;

            document.getElementById('cart-subtotal').innerText = `R${subtotal.toFixed(2)}`;
            document.getElementById('cart-discount').innerText = `R${discount.toFixed(2)}`;
            document.getElementById('cart-shipping').innerText = shipping === 0 ? "FREE" : `R${shipping.toFixed(2)}`;
            document.getElementById('cart-total').innerText = `R${total.toFixed(2)}`;
        }

        function checkoutWhatsApp() {
            if (cart.length === 0) return alert("Your cart is empty!");
            
            let message = "New Order Request:%0A";
            cart.forEach(item => {
                message += `- ${item.name} (x${item.quantity})%0A`;
            });
            message += `%0ATotal: ${document.getElementById('cart-total').innerText}`;
            
            // Updated WhatsApp Number
            window.open(`https://wa.me/27604216988?text=${message}`);
        }

        renderProducts();
    </script>
</body>
</html>
