<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalyst Peptides | Research Chemicals South Africa</title>
    <link rel="stylesheet" href="style.css">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-43W7D6SGG7"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-43W7D6SGG7');
    </script>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo-container">
                <span class="logo-text">KATALYST PEPTIDES</span>
            </div>
            <div class="nav-links">
                <a href="index.html">Catalog</a>
                <a href="articles.html">Research Hub</a>
                <a href="calculator.html">Dosing Tool</a>
            </div>
        </nav>
    </header>

    <div class="promo-banner">
        SPECIAL: 10% OFF & FREE SHIPPING ON ORDERS OVER R3000
    </div>

    <main class="main-layout">
        <section id="product-grid" class="product-grid">
            </section>

        <aside id="cart-sidebar" class="cart-sidebar">
            <h2>Your Order</h2>
            <div id="cart-items" class="cart-items-container"></div>
            
            <div class="cart-totals">
                <div class="total-line">
                    <span>Subtotal:</span>
                    <span id="subtotal">R0.00</span>
                </div>
                <div id="discount-line" class="total-line discount-text" style="display:none;">
                    <span>Bulk Special (10%):</span>
                    <span id="discount">-R0.00</span>
                </div>
                <div class="total-line">
                    <span>Shipping:</span>
                    <span id="shipping">R150.00</span>
                </div>
                <div class="total-line final-total">
                    <span>Grand Total:</span>
                    <span id="total">R0.00</span>
                </div>
            </div>
            <button onclick="checkout()" class="checkout-btn">Complete via WhatsApp</button>
        </aside>
    </main>

    <script>
        // Full Product List with 10% Price Increase Applied
        const products = [
            { id: 1, name: "BPC157 (5mg)", price: 495, img: "bpc157.jpg" },
            { id: 2, name: "IGF1-LR3 (1mg)", price: 2950, img: "igf.jpg" },
            { id: 3, name: "Semax (5mg)", price: 495, img: "semax.jpg" },
            { id: 4, name: "Selank (5mg)", price: 495, img: "selank.jpg" },
            { id: 5, name: "Semaglutide (5mg)", price: 660, img: "sema5.jpg" },
            { id: 6, name: "Tirzepatide (5mg)", price: 825, img: "tirz5.jpg" },
            { id: 7, name: "Retatrutide (30mg)", price: 1595, img: "reta30.jpg" },
            { id: 8, name: "Retatrutide (50mg)", price: 2035, img: "reta50.jpg" },
            { id: 9, name: "GHK-CU (100mg)", price: 495, img: "ghk.jpg" },
            { id: 10, name: "Mots-C (40mg)", price: 990, img: "mots.jpg" },
            { id: 11, name: "Wolverine Stack", price: 825, img: "wolverine.jpg" },
            { id: 12, name: "SLU PP-332", price: 550, img: "slu.jpg" },
            { id: 13, name: "Syringes (Pack)", price: 36, img: "syringes.jpg" }
        ];

        let cart = [];

        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.map(p => `
                <div class="product-card">
                    <img src="${p.img}" alt="${p.name}">
                    <h3>${p.name}</h3>
                    <p class="price">R${p.price.toFixed(2)}</p>
                    <button onclick="addToCart(${p.id})">Add to Order</button>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const item = products.find(p => p.id === id);
            const exists = cart.find(c => c.id === id);
            if (exists) { exists.qty++; } else { cart.push({...item, qty: 1}); }
            updateCart();
        }

        function updateCart() {
            const container = document.getElementById('cart-items');
            container.innerHTML = cart.map(c => `
                <div class="cart-item">
                    <span>${c.name} x${c.qty}</span>
                    <span>R${(c.price * c.qty).toFixed(2)}</span>
                </div>
            `).join('');

            let sub = cart.reduce((a, b) => a + (b.price * b.qty), 0);
            let disc = 0;
            let ship = 150;

            if (sub >= 3000) {
                disc = sub * 0.10;
                ship = 0;
                document.getElementById('discount-line').style.display = 'flex';
            } else {
                document.getElementById('discount-line').style.display = 'none';
            }

            document.getElementById('subtotal').innerText = `R${sub.toFixed(2)}`;
            document.getElementById('discount').innerText = `-R${disc.toFixed(2)}`;
            document.getElementById('shipping').innerText = ship === 0 ? "FREE" : `R${ship.toFixed(2)}`;
            document.getElementById('total').innerText = `R${(sub - disc + ship).toFixed(2)}`;
        }

        function checkout() {
            if (cart.length === 0) return alert("Please add items first.");
            let message = "Katalyst Peptides Order:%0A";
            cart.forEach(c => message += `- ${c.name} x${c.qty}%0A`);
            message += `%0ATotal: ${document.getElementById('total').innerText}`;
            window.open(`https://wa.me/27604216988?text=${message}`);
        }

        renderProducts();
    </script>
</body>
</html>
